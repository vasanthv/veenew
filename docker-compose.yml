services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    # Deliberately not published to the host: the app is only reachable
    # through Caddy on the internal network.
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/internal/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - veenew

  caddy:
    build: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      APP_DOMAIN: ${APP_DOMAIN}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      TLS_CHECK_TOKEN: ${TLS_CHECK_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates live here. Losing this volume means re-issuing every
      # customer certificate, so keep it across rebuilds.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - veenew

  # Ships app + caddy stdout to Better Stack. Reading the Docker socket is what
  # lets it attach to containers across restarts; note this grants effective
  # root on the host, so treat the image tag as security-sensitive and pin it.
  vector:
    image: timberio/vector:0.44.0-alpine
    restart: unless-stopped
    environment:
      BETTERSTACK_INGEST_HOST: ${BETTERSTACK_INGEST_HOST}
      BETTERSTACK_SOURCE_TOKEN: ${BETTERSTACK_SOURCE_TOKEN}
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - vector_data:/var/lib/vector
    # Keep it from crowding the app on a 1 GB droplet.
    mem_limit: 128m
    depends_on:
      - app
    networks:
      - veenew

volumes:
  caddy_data:
  caddy_config:
  vector_data:

networks:
  veenew:
